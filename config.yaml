llm:
  # groq   — Groq's hosted Llama. FAST and cheap: ~0.2s to first token (Gemini is
  #          ~1s), which matters when a viewer is waiting for a reply. Needs
  #          GROQ_API_KEY. Good English + Arabic.
  # gemini — Google Gemini Flash. Needs GEMINI_API_KEY *with billing enabled*: the
  #          free tier is 20 requests/DAY, which a live stream burns in minutes.
  provider: groq
  model: llama-3.3-70b-versatile
  # Other Groq models: llama-3.1-8b-instant (faster, but its Arabic is poor),
  #   qwen/qwen3-32b, openai/gpt-oss-120b. For gemini: gemini-2.5-flash.
  grounding: false               # Gemini ONLY (web search). Ignored on groq.
  max_output_tokens: 120         # short, spoken answers
  temperature: 0.9               # variety -> never-repeating narration

tts:
  # provider selects the PRIMARY engine:
  #   edge              Microsoft neural voice — FREE, no key, no GPU (Mac/Linux). Arabic via edge too.
  #   chatterbox_multi  Chatterbox Multilingual V3 — Arabic + English, CUDA only (Vast.ai)
  #   chatterbox        Chatterbox Turbo — English only, CUDA only, paralinguistic tags
  #   kokoro            local 82M, English only, free (Mac/CPU) — Arabic falls to edge/elevenlabs
  # chatterbox (Turbo) is the ENGLISH voice: it is the ONLY engine that performs
  # [laugh]/[chuckle]/[sigh] as REAL SOUNDS rather than speaking the word. Arabic
  # is served by chatterbox_multi below (tts.arabic.engine), so BOTH languages keep
  # the same cloned voice and English also gets real laughter. Two models on the
  # GPU — that's the cost.
  # CUDA-ONLY: on a Mac (no NVIDIA GPU) this auto-falls back to edge-tts.
  provider: chatterbox
  edge_voice_id: "en-US-AndrewNeural"   # edge-tts MALE English voice (Bello). others: en-US-BrianNeural
                                 # (casual), en-US-GuyNeural (passion), en-US-RogerNeural (lively)
  sample_rate: 24000             # MUST be 24000 (kokoro + all chatterbox models)
  output_device: null            # null = system default. Linux/server: PulseAudio null sink
                                 # feeds OBS. On a Mac use "BlackHole 2ch" instead.
  # Voice-clone reference audio (5-10s clip). Ref MUST match the language or the
  # accent bleeds through. Only the primary chatterbox engine uses these.
  # Paths are RELATIVE to the repo root and resolved by src/paths.py, so the same
  # config works on a Mac and on /root/bella on the server. Absolute still works.
  chatterbox_ref_audio: "voice_samples/bella_ref_en.wav"
  chatterbox_ref_audio_ar: "voice_samples/bella_ref_ar.wav"
  # Emotion / expressiveness (0.0 flat .. 1.0 intense). Delivery is NOT flat: the
  # baseline is used for ordinary lines and `_excited` for lines the brain wrote
  # with an "!" or a wow-word, so a punchline lands harder than a price quote
  # (see emphasis_for() in src/voice.py). Past ~0.9 Chatterbox gets shouty.
  chatterbox_exaggeration: 0.75          # ordinary spoken lines
  chatterbox_exaggeration_excited: 0.9   # punchlines, reactions, "!" lines
  # --- used only when provider: kokoro ---
  voice_id: "am_puck"            # kokoro MALE voice (Bello). others: am_onyx, am_fenrir, bm_george ...
  kokoro_lang: "a"               # 'a' US English, 'b' UK English
  model_id: "sonic-3"            # unused by kokoro; only for cartesia/elevenlabs
  arabic:                        # Arabic reply voice — used when the primary is English-only
    enabled: true                # set false for an English-only stream
    # chatterbox_multi = the SAME cloned voice as English (needs CUDA + an Arabic
    #   ref clip). This is what keeps both languages sounding like one person.
    # edge = free Microsoft neural voice (different voice) | elevenlabs = paid
    # Falls back to edge automatically if chatterbox_multi can't load.
    engine: chatterbox_multi
    voice_id: "ar-SA-HamedNeural"        # edge-tts MALE Saudi voice (matches am_puck)
    # other edge voices: ar-SA-ZariyahNeural (F), ar-EG-ShakirNeural (M, Egyptian),
    #                    ar-EG-SalmaNeural (F, Egyptian), ar-AE-HamdanNeural (M, UAE)
    # optional paid fallback (set engine: elevenlabs):
    elevenlabs_voice_id: "21m00Tcm4TlvDq8ikWAM"
    model_id: "eleven_flash_v2_5"

stream:
  username_env: TIKTOK_USERNAME  # read handle from .env
  language: en                   # en | ar | de | es | pt | fr
  theme: dubai_realestate        # loads knowledge/theme_<theme>.md  -> swap monthly
  # This is a MARKETING channel for Sobha, so most of the airtime promotes a
  # project. The rest is Dubai real-estate talk, which is what stops the stream
  # reading as a dry catalogue. 0.7 = 70% projects / 30% Dubai.
  project_share: 0.7
  idle_seconds: 6                # silence for this long -> narrate. Measured from
                                 # when Bello last SPOKE, not from viewer activity.
                                 # A narration also takes ~2-3s to think + speak,
                                 # so the real gap a viewer hears is this + ~3s.
                                 # 12 was leaving very long dead air on stream.
  demo_after_idle: 90            # idle this long -> swap background to full-screen app demo
  # Artificial pause before answering, meant to feel "human". REMOVED: the real
  # pipeline already costs ~2.4s (Groq ~1.4s + Chatterbox ~1.0s), and adding 1-3.5s
  # on top made Bello take ~4.7s to react — which reads as LAG on a live stream, not
  # as personality. Set to something like [0.3, 1.0] if you ever want it back.
  response_jitter: [0.0, 0.0]
  qa_cooldown: 3                 # min seconds between answered questions. Was 8, which
                                 # silently dropped most comments on a busy stream.

data:
  # Full Sobha dataset — the compact index lives in knowledge/sobha_projects.md
  # (always-on); this file is retrieved per-project for complete detail
  # (every floor plan, FAQ, currency) only when Bello is on that project.
  sobha_dataset: data/sobha_full_dataset.json
  # The 33 CURATED, ORDERED projects that have on-screen visuals. Bello walks
  # these 1->33 during idle time, promoting each while its images play in the
  # background, with a Dubai real-estate hook between projects so it never feels
  # like a dry catalog. Order + media come from media.projects_root folders.
  sobha_featured: data/sobha_featured.json

media:
  # One subfolder per project, named NN_slug (01_the_grove ...). The NN_ prefix
  # sets both the narration ORDER and which images show for that project.
  # Bundled INSIDE the repo (clips/sobha_projects) so the project is self-contained.
  projects_root: clips/sobha_projects
  slide_seconds: 4.5             # how long each image stays before the next

obs:
  host: localhost
  port: 4455
  password: "Dubai@2026"         # must match OBS -> Tools -> WebSocket Server Settings
  scene: "Live"
  # Make the LIVE scene match the exported reel: full-screen background, a
  # waist-up avatar bust pinned bottom-right, and a project title/price overlay
  # that shows only while on a project. Needs OBS running to take effect; tune
  # with `python tools/obs_apply_reel_layout.py`.
  reel_layout: true
  # The avatar clips have the generator's WATERMARK burned into the bottom of the
  # frame (over his hand). It can't be removed from the video, so the avatar is
  # pushed DOWN by this many pixels: the bottom band falls outside the canvas and
  # is never rendered. Raise it until the watermark is gone; too high and you start
  # losing his hand. Canvas is 720x1280, so ~60px is roughly a centimetre on a phone.
  avatar_drop_px: 60
  title_source: "BellaTitle"
  avatar_idle_source: "AvatarIdle"
  avatar_talk_source: "AvatarTalk"
  background_source: "Background"
  avatar_idle_loops:
    - "clips/avatar_idle_loops/idle.mp4"
  avatar_talk_loops:
    - "clips/avatar_talk_loops/talking1.mp4"
    - "clips/avatar_talk_loops/talking2.mp4"
    - "clips/avatar_talk_loops/talking3.mp4"
  demo_backgrounds:
    - "clips/Background/B1.png"
    - "clips/Background/B2.png"
    - "clips/Background/B3.png"
